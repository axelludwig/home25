<div class="screen">
    <header class="brand">linkenparis.com</header>

    <section class="menu-strip">
        <app-menu></app-menu>
    </section>

    <section class="content">
        <div class="time-zone">
            <section class="time-widget card-3d" aria-label="Date et heure actuelles" appCard3d>
                <p class="time-label">local time</p>
                <p class="time-value">{{ currentTime }}</p>
                <p class="date-value">{{ currentDay }} - {{ currentDate }}</p>
            </section>
        </div>

        <section class="weather-zone" aria-label="Meteo actuelle">
            <app-weather></app-weather>
        </section>

        <section class="forest-zone" aria-label="Visuel forêt"></section>
    </section>
</div>
